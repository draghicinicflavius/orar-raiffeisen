<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orar Echipa 12 - Raiffeisen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="login-box">
        <img src="raiff.png" width="180">
        <h3>Portal Orar Echipa 12</h3>
        <input type="text" id="userInput" placeholder="Utilizator">
        <input type="password" id="passInput" placeholder="Parolă">
        <button class="login-btn" onclick="checkLogin()">AUTENTIFICARE</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px;">Date incorecte!</p>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="header">
            <span>ORAR ECHIPA 12</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="container">
            <div id="adminZone" class="admin-panel" style="display: none; flex-direction: column; gap: 15px;">
                <div style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 5px;">
                    <span style="color: #FEE600; font-weight: bold;">PANOU CONTROL ADMIN</span>
                </div>
                
                <form action="/api/orar/upload" method="POST" enctype="multipart/form-data" style="display:flex; flex-wrap: wrap; gap:10px; align-items:center;">
                    <label for="adminMonth">Luna import:</label>
                    <select id="adminMonth" name="month" style="padding: 5px; border-radius: 4px;">
                        <option value="4">Aprilie</option>
                        <option value="5">Mai</option>
                        <option value="6">Iunie</option>
                        <option value="7">Iulie</option>
                    </select>
                    <input type="file" name="file" required>
                    <button type="submit" style="background:#FEE600; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; border-radius: 4px;">ÎNCARCĂ LUNA</button>
                </form>

              <div style="display: flex; gap: 10px; align-items: center; background: #222; padding: 10px; border-radius: 8px;">
    <span style="font-size: 12px; color: #eee;">Gestiune:</span>
    <button id="deleteMonthBtn" onclick="deleteCurrentMonth()" style="background:#e74c3c; color:white; border: none; padding: 8px 12px; border-radius:4px; cursor:pointer; font-size:11px;">
        ȘTERGE LUNA SELECTATĂ
    </button>
</div>
            </div>

            <div class="month-nav" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px;">
                <button class="month-btn active" onclick="filterByMonth(4, this)">Aprilie</button>
                <button class="month-btn" onclick="filterByMonth(5, this)">Mai</button>
                <button class="month-btn" onclick="filterByMonth(6, this)">Iunie</button>
                <button class="month-btn" onclick="filterByMonth(7, this)">Iulie</button>
            </div>

            <input type="text" id="searchInput" class="search-box" onkeyup="filterData()" placeholder="🔎 Caută numele tău în luna selectată...">
            
            <div id="results"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
